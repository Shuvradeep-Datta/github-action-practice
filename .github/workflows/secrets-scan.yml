#Use Git leakes
name: Secret Scan

on:
    workflow_call:
      

jobs:
    secret-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Code CheckOut
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            
            - name: gitleaks
              uses: gitleaks/gitleaks-action@v2
              env: 
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                