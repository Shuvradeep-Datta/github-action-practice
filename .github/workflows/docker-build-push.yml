name: docker-build & push

on:
    
    workflow_dispatch:
      
      

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
          - name: code Checkout
            uses: actions/checkout@v4

          - name: Login to Docker Hub
            uses: docker/login-action@v3
            with:
             username: ${{ vars.DOCKERHUB_USER }}
             password: ${{ secrets.DOCKERHUB_TOKEN }}

          - name: Build and push
            uses: docker/build-push-action@v6
            with:
                context: '.'
                push: true
                no-cache: true 
                pull: true
                tags: |
                    ${{ vars.DOCKERHUB_USER }}/flask-app1:latest
                    ${{ vars.DOCKERHUB_USER }}/flask-app1:${{ github.sha }}
                    ${{ vars.DOCKERHUB_USER }}/flask-app1:${{ github.ref_name }}