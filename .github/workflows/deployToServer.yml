name: Deploy-To-Server

on:
    workflow_call: 


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout code
          uses: actions/checkout@v4
       
        
        - name: Execute remote SSH commands using password and created app folder
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.EC2_SSH_HOST }}
            username: ${{ secrets.EC2_SSH_USER }}
            key: ${{secrets.EC2_SSH_PRIVATE_KEY}}
            script: |
                  echo "Running App and installing docker"
                  sudo apt install docker.io docker-compose-v2 -y
                  sudo usermod -aG docker $USER && newgrp docker
                  docker run hello-world
                  mkdir -p devops
        
        - name: Copy the docker-compose file
          uses: appleboy/scp-action@v1
          with:
              host: ${{ secrets.EC2_SSH_HOST }}
              username: ${{ secrets.EC2_SSH_USER }}
              key: ${{secrets.EC2_SSH_PRIVATE_KEY}}
              source: docker-compose.yml
              target: ~/devops/

        - name: Execute remote SSH commands using password and Run app
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.EC2_SSH_HOST }}
            username: ${{ secrets.EC2_SSH_USER }}
            key: ${{secrets.EC2_SSH_PRIVATE_KEY}}
            script: |
                  echo "Running App"
                  export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
                  export DOCKER_TAG=${{ github.event.workflow_run.head_sha }}
                  export DOCKER_TAG=${{ github.sha }}
                  echo ${{ github.sha }}
                  echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login --username ${{ vars.DOCKERHUB_USER }} --password-stdin
                  cd ~/devops/ && docker compose down || true && docker compose pull &&  docker compose up -d --force-recreate



